apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: statuswatch-rollup
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sdoolabh/statuswatch.git
    targetRevision: main
    path: k8s/workloads/rollup
  destination:
    server: https://kubernetes.default.svc
    namespace: statuswatch
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
