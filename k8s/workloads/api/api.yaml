apiVersion: apps/v1
kind: Deployment
metadata:
  name: statuswatch-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: statuswatch-api
  template:
    metadata:
      labels:
        app: statuswatch-api
    spec:
      containers:
        - name: api
          image: ghcr.io/sdoolabh/statuswatch-api:latest
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: statuswatch-db   # created by terraform-cluster, not git
          resources:
            requests: { cpu: 50m, memory: 128Mi }
            limits: { memory: 256Mi }
          readinessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: statuswatch-api
  labels:
    app: statuswatch-api
spec:
  selector:
    app: statuswatch-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: statuswatch-api
spec:
  ingressClassName: nginx
  rules:
    - host: api.shanedoolabh.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: statuswatch-api
                port:
                  number: 80
---
# Prometheus discovers the API through this — RED metrics with zero config.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: statuswatch-api
  labels:
    release: platform-monitoring
spec:
  selector:
    matchLabels:
      app: statuswatch-api
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
