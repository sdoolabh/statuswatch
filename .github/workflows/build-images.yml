name: build-images
on:
  push:
    branches: [main]
    paths: ["app/**"]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [api, rollup]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: app/${{ matrix.component }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/statuswatch-${{ matrix.component }}:latest
            ghcr.io/${{ github.repository_owner }}/statuswatch-${{ matrix.component }}:${{ github.sha }}
