  - {slug: snowflake,    name: Snowflake,       adapter: statuspage, base_url: https://status.snowflake.com,      category: data}
  - {slug: hashicorp,    name: HashiCorp Cloud, adapter: statuspage, base_url: https://status.hashicorp.com,      category: devtools}
  - {slug: grafana,      name: Grafana Cloud,   adapter: statuspage, base_url: https://status.grafana.com,        category: observability}
