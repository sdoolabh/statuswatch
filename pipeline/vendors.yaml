# The vendor registry. Adding a vendor = adding an entry here, not code.
# adapter: statuspage → Atlassian Statuspage standard API (/api/v2/*.json)
#          others     → bespoke adapters in adapters/
# Run `python run_local.py probe` after editing — it verifies every entry
# against the live API and tells you exactly what works.

vendors:
  # ---- Atlassian Statuspage standard (one adapter covers all of these) ----
  - {slug: github,       name: GitHub,          adapter: statuspage, base_url: https://www.githubstatus.com,      category: devtools}
  - {slug: cloudflare,   name: Cloudflare,      adapter: statuspage, base_url: https://www.cloudflarestatus.com,  category: network}
